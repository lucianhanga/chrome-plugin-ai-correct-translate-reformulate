<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Playwright Test Page -- Correct &amp; Translate</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px;
      background: #f5f5f5;
      color: #111;
    }
    .section { margin-bottom: 32px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; }
    textarea, input[type="text"] {
      width: 480px;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      display: block;
    }
    [contenteditable="true"] {
      width: 480px;
      min-height: 60px;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      display: block;
      outline: none;
    }
    .static-text {
      width: 480px;
      padding: 8px;
      font-size: 14px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 4px;
      user-select: text;
    }
    .long-text { width: 480px; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <h2>Test Page for Correct &amp; Translate Extension</h2>

  <!-- Section: textarea (editable, Accept replaces value) -->
  <div class="section">
    <label for="textarea-field">Textarea (editable)</label>
    <textarea
      id="textarea-field"
      rows="3"
      data-testid="textarea-field"
    >She dont know nothing about the project.</textarea>
  </div>

  <!-- Section: text input (editable) -->
  <div class="section">
    <label for="input-field">Text Input (editable)</label>
    <input
      id="input-field"
      type="text"
      data-testid="input-field"
      value="He go to work everyday."
    />
  </div>

  <!-- Section: contenteditable div -->
  <div class="section">
    <label>ContentEditable div</label>
    <div
      id="contenteditable-field"
      contenteditable="true"
      data-testid="contenteditable-field"
    >Der Hund bellt laut.</div>
  </div>

  <!-- Section: static (non-editable) paragraph -- Accept copies to clipboard -->
  <div class="section">
    <label>Static paragraph (non-editable)</label>
    <p id="static-text" class="static-text" data-testid="static-text">
      The quick brown fox jumps over the lazy dog.
    </p>
  </div>

  <!-- Section: text that is already grammatically correct (Ollama should return it unchanged) -->
  <div class="section">
    <label>Already correct text</label>
    <textarea
      id="already-correct"
      rows="2"
      data-testid="already-correct"
    >The meeting is at 10 AM.</textarea>
  </div>

  <!-- Section: text for translation tests -->
  <div class="section">
    <label>English text (for translation)</label>
    <textarea
      id="translate-source"
      rows="2"
      data-testid="translate-source"
    >Hello, how are you today?</textarea>
  </div>

  <!-- Section: very long text placeholder (filled by test) -->
  <div class="section">
    <label>Long text area (filled by test for INPUT_TOO_LONG check)</label>
    <textarea
      id="long-text-field"
      rows="3"
      data-testid="long-text-field"
    ></textarea>
  </div>
</body>
</html>
